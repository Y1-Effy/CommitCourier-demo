name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: commitcourier-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Add VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Configure SSH private key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/commitcourier_actions
          chmod 600 ~/.ssh/commitcourier_actions

      - name: Deploy application to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh \
            -i ~/.ssh/commitcourier_actions \
            -o IdentitiesOnly=yes \
            "$VPS_USER@$VPS_HOST" \
            "/home/deploy/deploy-commitcourier.sh"
