# Local dev database. Credentials match the .env.example default DATABASE_URL, so
# `cp .env.example .env` works against this with no extra setup. Not for production.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: commitcourier_demo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d commitcourier_demo"]
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
