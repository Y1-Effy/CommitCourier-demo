# Render Blueprint — one-click deploy of the live demo (web service + managed Postgres).
# Deploy: https://render.com/deploy?repo=https://github.com/Y1-Effy/commitcourier-demo
# (fork it? replace the repo URL above and in both READMEs with your own)
#
# This is a secondary path — the live demo actually ships to a VPS via
# .github/workflows/deploy.yml. Nothing here is exercised by CI, so it can rot unnoticed.
services:
  - type: web
    name: commitcourier-demo
    runtime: node
    plan: free
    # --include=dev is required, not cosmetic: NODE_ENV=production below is exported into the build
    # environment too, and npm then defaults to omit=dev — so a plain `npm install` would skip vite
    # and react-dom and the build would die on the first phase. CI never catches this because it
    # uses `npm ci` with NODE_ENV unset.
    buildCommand: npm install --include=dev && npm run build
    # migrate is idempotent; runs on every boot so the schema is always present.
    startCommand: npm run migrate && npm start
    healthCheckPath: /api/stats
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: commitcourier-db
          property: connectionString
      # PUBLIC_BASE_URL is left unset on purpose: config.ts falls back to RENDER_EXTERNAL_URL,
      # which Render injects with this service's own https URL.
      - key: DEMO_WEBHOOK_SECRET
        sync: false # generate your own: node -e "import('commitcourier').then(m=>console.log('whsec_'+m.generateSecretKey()))"

databases:
  - name: commitcourier-db
    plan: free
    postgresMajorVersion: "16"
