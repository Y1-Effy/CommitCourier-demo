<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121a30"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#8b7bff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="-40" r="320" fill="#1a2647" opacity="0.55"/>

  <!-- brand mark -->
  <g transform="translate(96,86)">
    <rect width="64" height="64" rx="14" fill="#0b1020" stroke="url(#accent)" stroke-width="2"/>
    <path d="M16 34 L48 18 L36 48 L31 37 Z" fill="url(#accent)"/>
    <circle cx="31" cy="37" r="3.2" fill="#0b1020"/>
    <text x="84" y="44" font-family="system-ui, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#e7ecf6">CommitCourier</text>
  </g>

  <!-- headline -->
  <text x="96" y="270" font-family="system-ui, Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" fill="#e7ecf6">Webhooks that can't lie</text>
  <text x="96" y="356" font-family="system-ui, Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" fill="#e7ecf6">about your data.</text>

  <!-- subtitle -->
  <text x="98" y="430" font-family="system-ui, Segoe UI, Arial, sans-serif" font-size="32" fill="#9aa7c4">Transactional outbound webhooks — write the webhook in the</text>
  <text x="98" y="474" font-family="system-ui, Segoe UI, Arial, sans-serif" font-size="32" fill="#9aa7c4">same Postgres transaction as your business change.</text>

  <!-- feature chips -->
  <g font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="24" fill="#6ea8fe">
    <rect x="96" y="520" width="220" height="52" rx="26" fill="none" stroke="#2a3553"/>
    <text x="124" y="553">signing · retries</text>
    <rect x="336" y="520" width="150" height="52" rx="26" fill="none" stroke="#2a3553"/>
    <text x="364" y="553">DLQ · ledger</text>
    <rect x="506" y="520" width="240" height="52" rx="26" fill="none" stroke="#2a3553"/>
    <text x="534" y="553">SSRF protection</text>
  </g>

  <text x="1104" y="592" text-anchor="end" font-family="ui-monospace, Consolas, monospace" font-size="22" fill="#46d18a">npm install commitcourier</text>
</svg>
